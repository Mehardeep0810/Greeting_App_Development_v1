<!DOCTYPE html>
<html>
<head>
    <title>Greeting App</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            padding: 10px;
            width: 70%;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            color: #444;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🚀 Greeting App</h1>

    <input type="text" id="name" placeholder="Enter your name">
    <br>
    <button onclick="getGreeting()">Greet Me</button>

    <div id="result"></div>
</div>

<script>
    function getGreeting() {
        let name = document.getElementById("name").value;

        fetch("/greeting?name=" + name)
            .then(response => response.json())
            .then(data => {
                document.getElementById("result").innerHTML =
                    "✨ " + data.content;
            })
            .catch(err => {
                document.getElementById("result").innerHTML =
                    "Error fetching greeting!";
            });
    }
</script>

</body>
</html>
